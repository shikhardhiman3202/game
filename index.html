<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIKAR</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
    margin:auto;
    border:4px solid #333;
    background: black;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:20px;
    font-weight:bold;
    text-shadow:2px 2px 4px black;
}

#restartBtn{
    position:absolute;
    top:10px;
    right:10px;
    padding:10px 18px;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#ff4444;
    color:white;
}
</style>
</head>

<body>

<div id="ui">
    <div id="title" style="font-size:38px; color:yellow; text-shadow:3px 3px 5px black;">
        SIKAR VS MEEEEMS
    </div>

    Player: Meeeems |
    Score: <span id="score">0</span>/36 |
    Hearts: <span id="hearts">❤️❤️❤️</span>
    Time: <span id="timer">3:00</span>

</div>

<button id="restartBtn">Restart</button>

<canvas id="gameCanvas" width="900" height="550"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const heartsEl = document.getElementById("hearts");
const titleEl = document.getElementById("title");

let score = 0;
let hearts = 3;
let gameOver = false;
let win = false;
let timeLeft = 180; // 3 minutes
let fattiiTimer = 0;
let damageCooldown = 0;
let bossMode = false;

const player = {
    x: 100,
    y: 250,
    size: 40,
    speed: 5
};

const star = {
    x: 500,
    y: 250,
    size: 25
};

const shikhar = {
    x: 700,
    y: 120,
    size: 45,
    dx: 3,
    dy: 2
};

const keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

document.getElementById("restartBtn").addEventListener("click", () => {
    location.reload();
});

function movePlayer(){
    if(keys["ArrowUp"]) player.y -= player.speed;
    if(keys["ArrowDown"]) player.y += player.speed;
    if(keys["ArrowLeft"]) player.x -= player.speed;
    if(keys["ArrowRight"]) player.x += player.speed;

    player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));
}

function moveShikhar(){
    shikhar.x += shikhar.dx;
    shikhar.y += shikhar.dy;

    if(shikhar.x < 0 || shikhar.x > canvas.width - shikhar.size)
        shikhar.dx *= -1;

    if(shikhar.y < 0 || shikhar.y > canvas.height - shikhar.size)
        shikhar.dy *= -1;
}

function collide(a,b){
    return (
        a.x < b.x + b.size &&
        a.x + a.size > b.x &&
        a.y < b.y + b.size &&
        a.y + a.size > b.y
    );
}

function spawnStar(){
    star.x = Math.random() * (canvas.width - star.size);
    star.y = Math.random() * (canvas.height - star.size);
}

function drawPlayer(){
    ctx.fillStyle = "#3498db";
    ctx.fillRect(player.x, player.y, player.size, player.size);

    // IMPORTANT: reset alignment so text shows correctly
    ctx.textAlign = "left";
    ctx.textBaseline = "top";

    ctx.fillStyle = "white";
    ctx.font = "14px Arial";

    ctx.fillText("Meeeems", player.x, player.y - 18);
}

function drawStar(){
    ctx.fillStyle = "gold";
    ctx.beginPath();
    ctx.arc(star.x + 12, star.y + 12, 12, 0, Math.PI * 2);
    ctx.fill();
}

function drawShikhar(){
    ctx.fillStyle = "red";
    ctx.fillRect(shikhar.x, shikhar.y, shikhar.size, shikhar.size);

    ctx.fillStyle = "white";
    ctx.font = "14px Arial";
    ctx.textAlign = "left";
    ctx.fillText("Shikhar", shikhar.x, shikhar.y - 8);
}

function updateBossMode(){

    if(score >= 20 && !bossMode){
        bossMode = true;

        shikhar.size = 70;
        shikhar.dx = 5;
        shikhar.dy = 4;

        document.body.style.background = "#8B0000";
        titleEl.innerText = "BOSS FIGHT";
        titleEl.style.color = "white";
    }
}

function updateGame(){

    if(gameOver || win) return;

    movePlayer();
    moveShikhar();
    updateBossMode();

    if(collide(player, star)){
        score++;
        scoreEl.textContent = score;
        spawnStar();
        if(score >= 36) win = true;
    }

    if(damageCooldown > 0) damageCooldown--;

    if(collide(player, shikhar) && damageCooldown === 0){
        hearts--;
        damageCooldown = 60;
        fattiiTimer = 90;
        heartsEl.textContent = "❤️".repeat(hearts);

        if(hearts <= 0){
            gameOver = true;
        }
    }
}

function drawFattii(){
    if(fattiiTimer > 0 && !gameOver && !win){
        ctx.fillStyle = "yellow";
        ctx.font = "30px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Fattii", canvas.width/2, 60);
        fattiiTimer--;
    }
}

function drawGame(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(gameOver){
        ctx.fillStyle = "black";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "red";
        ctx.font = "50px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
        return;
    }

    if(win){
        ctx.fillStyle = "#111";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "gold";
        ctx.font = "40px Arial";
        ctx.textAlign = "center";
        ctx.fillText("I'll see you in school !", canvas.width/2, canvas.height/2);
        return;
    }

    drawPlayer();
    drawStar();
    drawShikhar();
    drawFattii();
}

function loop(){
    updateGame();
    drawGame();
    requestAnimationFrame(loop);
}

spawnStar();
loop();

setInterval(() => {

    if(gameOver || win) return;

    timeLeft--;

    let min = Math.floor(timeLeft / 60);
    let sec = timeLeft % 60;

    document.getElementById("timer").textContent =
        `${min}:${sec < 10 ? "0" : ""}${sec}`;

    if(timeLeft <= 0){
        gameOver = true;
    }

}, 1000);

</script>

</body>
</html>
